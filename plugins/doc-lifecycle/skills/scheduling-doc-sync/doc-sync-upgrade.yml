# doc-sync-upgrade — keep the installed doc-sync wiring current with the plugin.
# Installed by the doc-lifecycle plugin's `scheduling-doc-sync` skill; re-run that
# skill to upgrade this file. Preserves .github/doc-sync-marker, audit-scope.json,
# and the install-time knobs. Design: docs/decisions.md's doc-sync self-upgrade
# entry in aj604/toolshed.
#
# Why this exists: the nightly/weekly workflows pin plugin_marketplaces to a
# release tag, so the skills they invoke are frozen at the version the vendored
# wiring was generated from. This workflow is the ONLY thing that advances that
# pin — weekly it compares the installed version to the plugin's latest release
# and, when a newer one ships, regenerates the wiring at it and opens a review PR.
name: doc-sync-upgrade

on:
  schedule:
    - cron: "{{UPGRADE_CRON}}"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: doc-sync-upgrade
  cancel-in-progress: false

jobs:
  upgrade:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve versions
        id: versions
        run: |
          set -euo pipefail
          test -f .github/doc-sync/installed-version || {
            echo "::error::.github/doc-sync/installed-version missing — run the scheduling-doc-sync installer"; exit 1; }
          CURRENT=$(cat .github/doc-sync/installed-version)
          # Latest published release of the plugin marketplace (tagName is v-prefixed).
          LATEST=$(gh release view --repo aj604/toolshed --json tagName --jq .tagName | sed 's/^v//')
          OPEN_PRS=$(gh pr list --head doc-sync/upgrade --state open --json number --jq length)
          {
            echo "current=${CURRENT}"
            echo "latest=${LATEST}"
            echo "open_prs=${OPEN_PRS}"
          } >> "$GITHUB_OUTPUT"

      - name: Gate
        id: gate
        run: |
          set -euo pipefail
          # An already-open upgrade PR awaits a human — don't stack a second one.
          if [ "${{ steps.versions.outputs.open_prs }}" -gt 0 ]; then
            echo "decision=skip-pending" >> "$GITHUB_OUTPUT"
            PR_URL=$(gh pr list --head doc-sync/upgrade --state open --json url --jq '.[0].url')
            python3 .github/doc-sync/render-report.py upgrade-summary \
              --status pending --current "${{ steps.versions.outputs.current }}" \
              --latest "${{ steps.versions.outputs.latest }}" --pr-url "${PR_URL}"
            exit 0
          fi
          # Semver comparison lives in the tested gate, never in YAML string-fu.
          DECISION=$(python3 .github/doc-sync/upgrade-gate.py compare \
            --current "${{ steps.versions.outputs.current }}" \
            --latest "${{ steps.versions.outputs.latest }}")
          echo "gate: ${DECISION}"
          echo "decision=${DECISION}" >> "$GITHUB_OUTPUT"
          # current / ahead both self-explain and stop here; only 'upgrade' proceeds.
          if [ "${DECISION}" != "upgrade" ]; then
            python3 .github/doc-sync/render-report.py upgrade-summary \
              --status "${DECISION}" --current "${{ steps.versions.outputs.current }}" \
              --latest "${{ steps.versions.outputs.latest }}"
          fi

      # Check out the target release so apply-upgrade.py has the new version's wiring
      # (templates + scripts) to copy from, and runs its own target-version upgrade
      # logic. Clone the *target* (steps.versions.latest), not installed-version —
      # the lockfile still holds the old version until this run advances it. Clone
      # under RUNNER_TEMP, outside the work tree, so the PR steps' `git add -A` can't
      # capture it.
      - name: Check out target marketplace at v${{ steps.versions.outputs.latest }}
        if: steps.gate.outputs.decision == 'upgrade'
        run: |
          set -euo pipefail
          rm -rf "${RUNNER_TEMP}/toolshed-marketplace"
          git clone --depth 1 --branch "v${{ steps.versions.outputs.latest }}" \
            https://github.com/aj604/toolshed.git "${RUNNER_TEMP}/toolshed-marketplace"

      # Regenerate the wiring deterministically at the new version. Now that the
      # workflow YAML is version-agnostic (the Pin steps read installed-version at
      # runtime), an upgrade is pure mechanics — re-copy the seven scripts, re-render the
      # three templates with the consumer's preserved knobs, bump the lockfile — so a
      # tested script does it, no model call (hence no model auth in this workflow).
      # Run it FROM the pinned checkout so the target version's own upgrade logic
      # applies. The script writes files only; the steps below own git/PR. apply-upgrade.py
      # owns which files to lay down and how to preserve state/knobs — never re-implement
      # that as a cp/sed here.
      - name: Regenerate wiring (deterministic)
        if: steps.gate.outputs.decision == 'upgrade'
        run: |
          set -euo pipefail
          python3 "${RUNNER_TEMP}/toolshed-marketplace/plugins/doc-lifecycle/skills/scheduling-doc-sync/scripts/apply-upgrade.py" \
            --plugin-root "${RUNNER_TEMP}/toolshed-marketplace/plugins/doc-lifecycle" \
            --repo "${GITHUB_WORKSPACE}" \
            --target "${{ steps.versions.outputs.latest }}"

      - name: Open upgrade PR
        if: steps.gate.outputs.decision == 'upgrade'
        run: |
          set -euo pipefail
          if git diff --quiet && git diff --cached --quiet; then
            # Version advanced but the regenerated wiring is byte-identical — nothing to land.
            python3 .github/doc-sync/render-report.py upgrade-summary \
              --status noop --current "${{ steps.versions.outputs.current }}" \
              --latest "${{ steps.versions.outputs.latest }}"
            exit 0
          fi
          CHANGED=$(git diff --name-only | paste -sd, -)
          # The Actions GITHUB_TOKEN cannot push files under .github/workflows/ — GitHub
          # blocks it, and the `workflows` permission is not grantable to it. Version-only
          # upgrades don't touch those files (the pin is read from installed-version at
          # runtime), so the push below succeeds. But an upgrade that changes the workflow
          # TEMPLATES themselves can't land automatically — emit the diff as a patch
          # artifact and fail loud with apply instructions, not a cryptic push rejection.
          if git diff --name-only | grep -q '^\.github/workflows/'; then
            git diff > "$RUNNER_TEMP/doc-sync-upgrade.patch"
            python3 .github/doc-sync/render-report.py upgrade-summary \
              --status blocked-workflows --current "${{ steps.versions.outputs.current }}" \
              --latest "${{ steps.versions.outputs.latest }}" --files "${CHANGED}"
            exit 1
          fi
          python3 .github/doc-sync/render-report.py upgrade-pr-body \
            --current "${{ steps.versions.outputs.current }}" \
            --latest "${{ steps.versions.outputs.latest }}" \
            --files "${CHANGED}" > "$RUNNER_TEMP/upgrade-pr-body.md"
          git config user.name "doc-sync"
          git config user.email "doc-sync@users.noreply.github.com"
          git checkout -b doc-sync/upgrade
          git add -A
          git commit -m "docs: upgrade doc-sync wiring to plugin v${{ steps.versions.outputs.latest }}"
          # Push via an explicit token URL for parity with the other lanes' pushes (and to
          # not depend on checkout's persisted credential surviving). --force: a closed-unmerged
          # PR can leave a stale branch. No -u: a token-bearing URL must not persist in config.
          git push --force "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" doc-sync/upgrade
          PR_URL=$(gh pr create \
            --title "docs: upgrade doc-sync wiring to plugin v${{ steps.versions.outputs.latest }}" \
            --body-file "$RUNNER_TEMP/upgrade-pr-body.md" \
            --head doc-sync/upgrade \
            --base "${{ github.ref_name }}")
          python3 .github/doc-sync/render-report.py upgrade-summary \
            --status opened --current "${{ steps.versions.outputs.current }}" \
            --latest "${{ steps.versions.outputs.latest }}" --pr-url "${PR_URL}"

      # When the upgrade regenerated workflow files, the step above wrote the diff here
      # and failed loud (the token can't push .github/workflows/); publish it so a human
      # can apply it locally. No-op for the common version-only upgrade (no patch file).
      - name: Upload upgrade patch (manual apply for workflow-file changes)
        if: always() && steps.gate.outputs.decision == 'upgrade'
        uses: actions/upload-artifact@v4
        with:
          name: doc-sync-upgrade-patch
          path: ${{ runner.temp }}/doc-sync-upgrade.patch
          if-no-files-found: ignore

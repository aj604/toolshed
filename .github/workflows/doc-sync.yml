# doc-sync — nightly documentation drift sync.
# Installed by the doc-lifecycle plugin's `scheduling-doc-sync` skill; re-run that
# skill to upgrade this file (it preserves .github/doc-sync-marker).
# Design: docs/decisions.md's 2026-07-02 doc-sync automation entries in aj604/toolshed.
name: doc-sync

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch: {}
  # v1 is nightly-only. A pull_request mode (Tier-3 verification over the PR's own
  # diff) is a deliberate seam for later — add it here, not as a second workflow.

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write   # claude-code-action OAuth token exchange

concurrency:
  group: doc-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      CAP: "10"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # the gate diffs marker..HEAD

      - name: Gather facts
        id: facts
        run: |
          set -euo pipefail
          test -f .github/doc-sync-marker || {
            echo "::error::.github/doc-sync-marker missing — run the scheduling-doc-sync installer"; exit 1; }
          MARKER=$(cat .github/doc-sync-marker)
          HEAD_SHA=$(git rev-parse HEAD)
          # Marker-only commits don't count as new work — else each clean run's
          # marker commit would trigger the next night's detect forever.
          COMMITS=$(git rev-list --count "${MARKER}..HEAD" -- . ':(exclude).github/doc-sync-marker')
          OPEN_PRS=$(gh pr list --head doc-sync/nightly --state open --json number --jq length)
          OPEN_ISSUES=$(gh issue list --label doc-sync --state open --json number --jq length)
          {
            echo "marker=${MARKER}"
            echo "head_sha=${HEAD_SHA}"
            echo "commits=${COMMITS}"
            echo "open_prs=${OPEN_PRS}"
            echo "open_issues=${OPEN_ISSUES}"
          } >> "$GITHUB_OUTPUT"

      - name: Gate (pre-detection)
        id: pre
        run: |
          set -euo pipefail
          DECISION=$(python3 .github/doc-sync/sync-gate.py pre \
            --commits "${{ steps.facts.outputs.commits }}" \
            --open-prs "${{ steps.facts.outputs.open_prs }}" \
            --open-issues "${{ steps.facts.outputs.open_issues }}")
          echo "pre-gate: ${DECISION}"
          echo "decision=${DECISION}" >> "$GITHUB_OUTPUT"
          # Every terminal state explains itself on the run page — a reader must
          # never have to infer why the remaining steps were skipped. Rendering is
          # owned by render-report.py (one place, unit-tested), never inline YAML.
          python3 .github/doc-sync/render-report.py pre-summary \
            --decision "${DECISION}" \
            --marker "${{ steps.facts.outputs.marker }}" \
            --head "${{ steps.facts.outputs.head_sha }}" \
            --commits "${{ steps.facts.outputs.commits }}" \
            --open-prs "${{ steps.facts.outputs.open_prs }}" \
            --open-issues "${{ steps.facts.outputs.open_issues }}"

      # Model steps run via the official runner (anthropics/claude-code-action) —
      # it owns Claude Code install, plugin setup, and auth. Auth prefers the OAuth
      # token (created by /install-github-app); an unset secret renders empty and the
      # action treats empty as absent, so ANTHROPIC_API_KEY alone also works.
      - name: Detect drift (headless, diff-scoped)
        if: steps.pre.outputs.decision == 'detect'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          plugin_marketplaces: https://github.com/aj604/toolshed.git#v0.8.0
          plugins: doc-lifecycle@toolshed
          prompt: >-
            Use the doc-lifecycle:detecting-doc-drift skill in diff-scoped mode over the
            git commit range ${{ steps.facts.outputs.marker }}..${{ steps.facts.outputs.head_sha }}
            of this repository. Write the wrapped result object
            ({"records": [...], "summary": {...}}) to drift-report.json in the repository
            root. If the diff invalidates nothing, emit an empty records array with a zero
            summary.
          claude_args: --allowedTools "Read,Grep,Glob,Write,Bash(git *),Bash(python3 *)"

      - name: Assert detect produced a report
        if: steps.pre.outputs.decision == 'detect'
        run: |
          test -f drift-report.json || { echo "::error::detect step produced no drift-report.json"; exit 1; }

      - name: Validate report (mechanical contract check)
        if: steps.pre.outputs.decision == 'detect'
        run: python3 .github/doc-sync/validate-drift-output.py drift-report.json

      - name: Upload report artifact
        if: always() && steps.pre.outputs.decision == 'detect'
        uses: actions/upload-artifact@v4
        with:
          name: drift-report
          path: drift-report.json
          if-no-files-found: ignore

      - name: Gate (post-detection)
        if: steps.pre.outputs.decision == 'detect'
        id: post
        run: |
          set -euo pipefail
          DECISION=$(python3 .github/doc-sync/sync-gate.py post --report drift-report.json --cap "${CAP}")
          echo "post-gate: ${DECISION}"
          echo "decision=${DECISION}" >> "$GITHUB_OUTPUT"

      - name: Advance marker (no drift)
        if: steps.post.outputs.decision == 'advance-marker'
        run: |
          set -euo pipefail
          rm -f drift-report.json
          git config user.name "doc-sync"
          git config user.email "doc-sync@users.noreply.github.com"
          echo "${{ steps.facts.outputs.head_sha }}" > .github/doc-sync-marker
          git add .github/doc-sync-marker
          git commit -m "docs: advance doc-sync marker (no drift in ${{ steps.facts.outputs.commits }} commit(s))"
          # Branch protection may forbid this push; the marker then rides in the next sync PR.
          # Self-authenticate off GH_TOKEN: claude-code-action drops the checkout-persisted
          # credential from git config, so a bare `git push` goes out unauthenticated.
          if git push "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:${{ github.ref_name }}; then
            python3 .github/doc-sync/render-report.py no-drift-summary \
              --commits "${{ steps.facts.outputs.commits }}" \
              --head "${{ steps.facts.outputs.head_sha }}"
          else
            python3 .github/doc-sync/render-report.py no-drift-summary \
              --commits "${{ steps.facts.outputs.commits }}" \
              --head "${{ steps.facts.outputs.head_sha }}" \
              --push-rejected
          fi

      - name: Open blast-radius issue
        if: steps.post.outputs.decision == 'blast-radius'
        run: |
          set -euo pipefail
          python3 .github/doc-sync/render-report.py issue-body \
            --report drift-report.json --cap "${CAP}" \
            --marker "${{ steps.facts.outputs.marker }}" \
            --head "${{ steps.facts.outputs.head_sha }}" \
            > "$RUNNER_TEMP/issue-body.md"
          ISSUE_URL=$(gh issue create --label doc-sync \
            --title "doc-sync: drift exceeds blast-radius cap (${CAP})" \
            --body-file "$RUNNER_TEMP/issue-body.md")
          python3 .github/doc-sync/render-report.py blast-summary \
            --report drift-report.json --cap "${CAP}" --issue-url "${ISSUE_URL}"

      - name: Apply fixes (headless)
        if: steps.post.outputs.decision == 'proceed'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          plugin_marketplaces: https://github.com/aj604/toolshed.git#v0.8.0
          plugins: doc-lifecycle@toolshed
          prompt: >-
            Use the doc-lifecycle:fixing-doc-drift skill to apply the drift report at
            drift-report.json to this repository's docs. Follow the skill's rules exactly.
          claude_args: --allowedTools "Read,Grep,Glob,Edit,Write,Bash(git *),Bash(python3 *)"

      - name: Open sync PR
        if: steps.post.outputs.decision == 'proceed'
        run: |
          set -euo pipefail
          mv drift-report.json "$RUNNER_TEMP/drift-report.json"
          DATE=$(date -u +%F)
          python3 .github/doc-sync/render-report.py pr-body \
            --report "$RUNNER_TEMP/drift-report.json" \
            --marker "${{ steps.facts.outputs.marker }}" \
            --head "${{ steps.facts.outputs.head_sha }}" \
            > "$RUNNER_TEMP/pr-body.md"
          TITLE=$(python3 .github/doc-sync/render-report.py pr-title \
            --report "$RUNNER_TEMP/drift-report.json" --date "${DATE}")
          git config user.name "doc-sync"
          git config user.email "doc-sync@users.noreply.github.com"
          git checkout -b doc-sync/nightly
          echo "${{ steps.facts.outputs.head_sha }}" > .github/doc-sync-marker
          git add -A
          git commit -m "docs: sync with ${{ github.ref_name }} (${DATE})"
          # --force: a closed-unmerged PR can leave a stale branch behind.
          # Self-authenticate off GH_TOKEN (see advance-marker note): claude-code-action ran
          # just above and drops the checkout-persisted credential. No `-u` — a token-bearing
          # URL must not persist into .git/config. Pushing by URL leaves no upstream tracking
          # ref, so gh can't infer the head; pass --head explicitly.
          git push --force "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" doc-sync/nightly
          PR_URL=$(gh pr create \
            --title "${TITLE}" \
            --body-file "$RUNNER_TEMP/pr-body.md" \
            --head doc-sync/nightly \
            --base "${{ github.ref_name }}")
          python3 .github/doc-sync/render-report.py pr-summary \
            --report "$RUNNER_TEMP/drift-report.json" --pr-url "${PR_URL}"

# doc-bloat — weekly documentation bloat sweep (plan → chunked detect → assemble → propose).
# Installed by the doc-lifecycle plugin's `scheduling-doc-sync` skill; re-run that skill to
# upgrade this file. Sibling to doc-sync.yml (drift): bloat is detect-and-propose only —
# fixing-doc-bloat applies a human-approved subset, so each lane opens a DRAFT PR and the
# merge is the approval.
# Orchestration is deterministic: plan-chunks.py plans bounded chunks (no model) with
# content-addressed ids and per-chunk turn budgets, resuming past any prior run's checkpoint
# artifacts; each sweep invocation gets its slice verbatim via --emit-prompt; a failed attempt
# is classified (sync-gate.py bloat-retry: budget exhaustion escalates the cap, anything else
# retries fresh); assembly tolerates gaps (--allow-partial) and records them as the report's
# "unswept" list, rendered as a loud PR-body banner — a twice-failed chunk costs its own docs,
# never the report, and the next sweep picks it up automatically. GitHub caps a matrix at 256
# jobs; on a corpus that plans past that, set chunking.max_chunks (audit-scope.json) and sweep
# in resumed passes. Design: docs/plans/2026-07-06-detecting-doc-bloat-rearchitecture-design.md
# + docs/plans/2026-07-07-bloat-scale-hardening-design.md in aj604/toolshed.
name: doc-bloat

on:
  schedule:
    - cron: "0 4 * * 1"
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  id-token: write   # claude-code-action OAuth token exchange

concurrency:
  group: doc-bloat
  cancel-in-progress: false

jobs:
  plan:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    outputs:
      decision: ${{ steps.pre.outputs.decision }}
      pending: ${{ steps.chunks.outputs.pending }}
      prune_pr: ${{ steps.facts.outputs.prune_pr }}
      distill_pr: ${{ steps.facts.outputs.distill_pr }}
    steps:
      - uses: actions/checkout@v4
      - name: Gather facts
        id: facts
        run: |
          set -euo pipefail
          PRUNE_PR=$(gh pr list --head doc-bloat/prune --state open --json number --jq length)
          DISTILL_PR=$(gh pr list --head doc-bloat/distill --state open --json number --jq length)
          {
            echo "prune_pr=${PRUNE_PR}"
            echo "distill_pr=${DISTILL_PR}"
          } >> "$GITHUB_OUTPUT"
      - name: Gate (pre-sweep)
        id: pre
        run: |
          set -euo pipefail
          DECISION=$(python3 .github/doc-sync/sync-gate.py bloat-pre \
            --prune-pr-open "${{ steps.facts.outputs.prune_pr }}" \
            --distill-pr-open "${{ steps.facts.outputs.distill_pr }}")
          echo "decision=${DECISION}" >> "$GITHUB_OUTPUT"
          python3 .github/doc-sync/render-report.py bloat-pre-summary --decision "${DECISION}"
      - name: Fetch prior chunk results (resume)
        if: steps.pre.outputs.decision == 'detect'
        run: |
          set -euo pipefail
          mkdir -p chunks
          PREV=$(gh run list --workflow doc-bloat --status completed --limit 1 \
            --json databaseId --jq '.[0].databaseId // empty')
          if [ -n "${PREV}" ]; then
            gh run download "${PREV}" --pattern 'bloat-chunk*' --dir prior || true
            find prior -name '*.json' -exec cp {} chunks/ \; 2>/dev/null || true
          fi
          echo "carried $(ls chunks | wc -l) prior chunk result(s); content-addressed ids drop any whose docs changed"
      - name: Plan chunks (deterministic — no model)
        if: steps.pre.outputs.decision == 'detect'
        id: chunks
        run: |
          set -euo pipefail
          python3 .github/doc-sync/plan-chunks.py --out manifest.json --results-dir chunks
          echo "pending=$(python3 -c 'import json; print(json.dumps(json.load(open("manifest.json"))["pending"]))')" >> "$GITHUB_OUTPUT"
      - name: Upload manifest
        if: steps.pre.outputs.decision == 'detect'
        uses: actions/upload-artifact@v4
        with:
          name: bloat-manifest
          path: manifest.json
      - name: Upload carried results (so assemble sees prior + new)
        if: steps.pre.outputs.decision == 'detect'
        uses: actions/upload-artifact@v4
        with:
          name: bloat-chunks-carried
          path: chunks/
          if-no-files-found: ignore

  sweep:
    needs: plan
    if: needs.plan.outputs.decision == 'detect' && needs.plan.outputs.pending != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        chunk: ${{ fromJson(needs.plan.outputs.pending) }}
    env:
      CHUNK_ID: ${{ matrix.chunk }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: bloat-manifest
      - name: Render dispatch payload (slice verbatim, planner-computed budget)
        id: slice
        run: |
          set -euo pipefail
          echo "turns=$(python3 .github/doc-sync/plan-chunks.py --emit-turns "${CHUNK_ID}" --manifest manifest.json)" >> "$GITHUB_OUTPUT"
          {
            echo "prompt<<BLOAT_PROMPT_EOF"
            python3 .github/doc-sync/plan-chunks.py --emit-prompt "${CHUNK_ID}" --manifest manifest.json
            echo "BLOAT_PROMPT_EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Detect chunk (attempt 1)
        id: attempt1
        continue-on-error: true
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          plugin_marketplaces: https://github.com/aj604/toolshed.git#v0.8.0
          plugins: doc-lifecycle@toolshed
          prompt: ${{ steps.slice.outputs.prompt }}
          claude_args: --max-turns ${{ steps.slice.outputs.turns }} --allowedTools "Skill,Read,Grep,Glob,Write,Bash(git *),Bash(python3 *)"
      - name: Seam-validate (attempt 1)
        id: seam1
        continue-on-error: true
        run: python3 .github/doc-sync/validate-bloat-output.py --chunk "chunks/${CHUNK_ID}.json" --manifest manifest.json
      - name: Classify failure (budget-shaped escalates; anything else retries fresh)
        if: steps.seam1.outcome != 'success'
        id: retry
        run: |
          set -euo pipefail
          rm -f "chunks/${CHUNK_ID}.json"
          python3 .github/doc-sync/sync-gate.py bloat-retry \
            --execution-log "${{ steps.attempt1.outputs.execution_file || '/home/runner/work/_temp/claude-execution-output.json' }}" \
            --turns "${{ steps.slice.outputs.turns }}" >> "$GITHUB_OUTPUT"
      - name: Detect chunk (retry — fresh dispatch)
        if: steps.seam1.outcome != 'success'
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          plugin_marketplaces: https://github.com/aj604/toolshed.git#v0.8.0
          plugins: doc-lifecycle@toolshed
          prompt: ${{ steps.slice.outputs.prompt }}
          claude_args: --max-turns ${{ steps.retry.outputs.turns }} --allowedTools "Skill,Read,Grep,Glob,Write,Bash(git *),Bash(python3 *)"
      - name: Seam-validate (final)
        if: steps.seam1.outcome != 'success'
        run: |
          # On double failure, discard the invalid result BEFORE exiting: a leftover
          # invalid file would upload, fail the gap-tolerant assembly (which only
          # tolerates MISSING chunks), and mask the chunk as done on the next resume.
          python3 .github/doc-sync/validate-bloat-output.py --chunk "chunks/${CHUNK_ID}.json" --manifest manifest.json \
            || { rm -f "chunks/${CHUNK_ID}.json"; echo "::error::chunk ${CHUNK_ID} failed twice — its docs go to the report's unswept banner and the next sweep resumes them; every valid chunk is preserved as an artifact"; exit 1; }
      - name: Upload chunk result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bloat-chunk-${{ matrix.chunk }}
          path: chunks/${{ matrix.chunk }}.json
          if-no-files-found: ignore

  assemble:
    needs: [plan, sweep]
    # No pending-empty guard here (sweep keeps it): a fully-resumed run — every
    # chunk carried from the prior run's artifacts — must still assemble, gate,
    # and open lanes, or the carried state silently self-perpetuates forever.
    if: always() && needs.plan.outputs.decision == 'detect'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    outputs:
      prune: ${{ steps.prune.outputs.decision }}
      distill: ${{ steps.distill.outputs.decision }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: bloat-manifest
      - uses: actions/download-artifact@v4
        with:
          pattern: bloat-chunk*
          path: chunks
          merge-multiple: true
      - name: Assemble report (tolerates gaps — unswept chunks are recorded, never silent)
        run: python3 .github/doc-sync/validate-bloat-output.py --assemble chunks --manifest manifest.json --out bloat-report.json --allow-partial
      - name: Surface unswept gaps on the run summary
        run: python3 .github/doc-sync/render-report.py bloat-unswept-summary --report bloat-report.json
      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bloat-report
          path: bloat-report.json
          if-no-files-found: ignore
      - name: Gate (prune lane)
        id: prune
        run: |
          set -euo pipefail
          DECISION=$(python3 .github/doc-sync/sync-gate.py bloat-lane \
            --report bloat-report.json --lane prune \
            --pr-open "${{ needs.plan.outputs.prune_pr }}" \
            --out "$RUNNER_TEMP/prune.json")
          echo "decision=${DECISION}" >> "$GITHUB_OUTPUT"
          if [ "${DECISION}" != "open" ]; then
            python3 .github/doc-sync/render-report.py bloat-skip-summary --lane prune --reason "${DECISION}"
          fi
      - name: Gate (distill lane)
        id: distill
        run: |
          set -euo pipefail
          DECISION=$(python3 .github/doc-sync/sync-gate.py bloat-lane \
            --report bloat-report.json --lane distill \
            --pr-open "${{ needs.plan.outputs.distill_pr }}" \
            --out "$RUNNER_TEMP/distill.json")
          echo "decision=${DECISION}" >> "$GITHUB_OUTPUT"
          if [ "${DECISION}" != "open" ]; then
            python3 .github/doc-sync/render-report.py bloat-skip-summary --lane distill --reason "${DECISION}"
          fi

  prune:
    needs: [plan, assemble]
    if: needs.assemble.outputs.prune == 'open'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: bloat-report
      - name: Apply (headless)
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          plugin_marketplaces: https://github.com/aj604/toolshed.git#v0.8.0
          plugins: doc-lifecycle@toolshed
          prompt: >-
            Use the doc-lifecycle:fixing-doc-bloat skill to apply EVERY record in
            bloat-report.json whose verdict is CUT, CONDENSE, or EXTRACT-AND-MOVE — treat
            exactly those record IDs as the approved subset, and apply nothing else. Follow
            the skill's rules exactly.
          claude_args: --allowedTools "Read,Grep,Glob,Edit,Write,Bash(git *),Bash(python3 *)"
      - name: Open draft PR
        run: |
          set -euo pipefail
          DATE=$(date -u +%F)
          python3 .github/doc-sync/sync-gate.py bloat-lane \
            --report bloat-report.json --lane prune --pr-open 0 \
            --out "$RUNNER_TEMP/lane.json" >/dev/null
          rm -f bloat-report.json
          python3 .github/doc-sync/render-report.py bloat-pr-body \
            --report "$RUNNER_TEMP/lane.json" > "$RUNNER_TEMP/body.md"
          TITLE=$(python3 .github/doc-sync/render-report.py bloat-pr-title \
            --report "$RUNNER_TEMP/lane.json" --lane prune --date "${DATE}")
          git config user.name "doc-bloat"
          git config user.email "doc-bloat@users.noreply.github.com"
          git checkout -b doc-bloat/prune
          # Prune verdicts land inline (uncommitted); commit them. A clean index means the
          # sweep produced no diff — skip cleanly rather than failing on an empty commit.
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "docs: bloat prune sweep (${DATE})"
          fi
          if git diff --quiet "${{ github.sha }}" HEAD; then
            python3 .github/doc-sync/render-report.py bloat-skip-summary --lane prune --reason skip-noop
            exit 0
          fi
          git push --force "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" doc-bloat/prune
          PR_URL=$(gh pr create --draft \
            --title "${TITLE}" \
            --body-file "$RUNNER_TEMP/body.md" \
            --head doc-bloat/prune \
            --base "${{ github.ref_name }}")
          python3 .github/doc-sync/render-report.py bloat-pr-summary \
            --report "$RUNNER_TEMP/lane.json" --lane prune --pr-url "${PR_URL}"

  distill:
    needs: [plan, assemble]
    if: needs.assemble.outputs.distill == 'open'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: bloat-report
      - name: Apply (headless)
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          plugin_marketplaces: https://github.com/aj604/toolshed.git#v0.8.0
          plugins: doc-lifecycle@toolshed
          prompt: >-
            Use the doc-lifecycle:fixing-doc-bloat skill to apply EVERY record in
            bloat-report.json whose verdict is MERGE-DOC, RETIRE-DOC, or POLICY, or
            DISTILL with status "ready" — treat exactly those record IDs as the approved
            subset, and apply nothing else. DISTILL records dispatch the doc-distiller
            agent per the skill. Follow the skill's rules exactly.
          claude_args: --allowedTools "Task,Read,Grep,Glob,Edit,Write,Bash(git *),Bash(python3 *)"
      - name: Open draft PR
        run: |
          set -euo pipefail
          DATE=$(date -u +%F)
          python3 .github/doc-sync/sync-gate.py bloat-lane \
            --report bloat-report.json --lane distill --pr-open 0 \
            --out "$RUNNER_TEMP/lane.json" >/dev/null
          rm -f bloat-report.json
          python3 .github/doc-sync/render-report.py bloat-pr-body \
            --report "$RUNNER_TEMP/lane.json" > "$RUNNER_TEMP/body.md"
          TITLE=$(python3 .github/doc-sync/render-report.py bloat-pr-title \
            --report "$RUNNER_TEMP/lane.json" --lane distill --date "${DATE}")
          git config user.name "doc-bloat"
          git config user.email "doc-bloat@users.noreply.github.com"
          git checkout -b doc-bloat/distill
          # Inline verdicts (MERGE-DOC/RETIRE-DOC/POLICY) leave edits uncommitted; the
          # Apply step already committed each DISTILL result the distiller staged. Commit
          # any leftover uncommitted work; a clean index is normal here — don't fail on it.
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "docs: bloat distill sweep (${DATE})"
          fi
          # Nothing to propose if the branch matches the base commit (github.sha) — skip
          # cleanly instead of failing on an empty commit or opening an empty PR.
          if git diff --quiet "${{ github.sha }}" HEAD; then
            python3 .github/doc-sync/render-report.py bloat-skip-summary --lane distill --reason skip-noop
            exit 0
          fi
          git push --force "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" doc-bloat/distill
          PR_URL=$(gh pr create --draft \
            --title "${TITLE}" \
            --body-file "$RUNNER_TEMP/body.md" \
            --head doc-bloat/distill \
            --base "${{ github.ref_name }}")
          python3 .github/doc-sync/render-report.py bloat-pr-summary \
            --report "$RUNNER_TEMP/lane.json" --lane distill --pr-url "${PR_URL}"

# ci + release for the toolshed marketplace.
# CI (every PR and push): version-bump guard (PRs only, doc-sync/nightly exempt) +
# manifest validation + unit tests — the checks that have historically been run
# by hand before tagging.
# Release (pushes to main): when plugins/doc-lifecycle's version has no tag yet,
# tag vX.Y.Z and publish a GitHub Release. Cutting a release = bumping the
# version in your PR; the rest is mechanical.
name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # the version guard diffs against the PR base
      # Installed plugin content must ship under a new version — an unbumped change
      # means installers keep getting the old release. The unattended doc pipelines
      # (doc-sync/*, doc-bloat/*) are exempt: their doc fixes may touch skill text
      # without warranting a release, and they can't bump the version themselves.
      # A human cuts the release deliberately by bumping plugin.json in a later PR.
      - name: Require version bump when plugin content changes
        if: >-
          github.event_name == 'pull_request'
          && !startsWith(github.head_ref, 'doc-sync/')
          && !startsWith(github.head_ref, 'doc-bloat/')
        run: |
          set -euo pipefail
          BASE="origin/${{ github.base_ref }}"
          CHANGED=$(git diff --name-only "$(git merge-base "$BASE" HEAD)" HEAD -- plugins/doc-lifecycle/)
          if [ -z "$CHANGED" ]; then
            echo "✅ **Version guard:** no plugin content changed — no bump required." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          BASE_VERSION=$(git show "${BASE}:plugins/doc-lifecycle/.claude-plugin/plugin.json" | jq -r .version)
          HEAD_VERSION=$(jq -r .version plugins/doc-lifecycle/.claude-plugin/plugin.json)
          if [ "$BASE_VERSION" = "$HEAD_VERSION" ]; then
            echo "::error file=plugins/doc-lifecycle/.claude-plugin/plugin.json::plugin content changed but version is still ${HEAD_VERSION} — installers would get a stale release; bump the version"
            echo "🛑 **Version guard:** plugin content changed ($(echo "$CHANGED" | wc -l | tr -d ' ') file(s)) but version is still \`${HEAD_VERSION}\` — bump plugins/doc-lifecycle/.claude-plugin/plugin.json." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          echo "✅ **Version guard:** plugin content changed and version bumped \`${BASE_VERSION}\` → \`${HEAD_VERSION}\`." >> "$GITHUB_STEP_SUMMARY"
      - name: Unit tests
        run: |
          set -euo pipefail
          python3 tests/scripts/validate-drift-output_test.py
          python3 tests/scripts/sync-gate_test.py
          python3 tests/scripts/upgrade-gate_test.py
          python3 tests/scripts/apply-upgrade_test.py
          python3 tests/scripts/render-report_test.py
          python3 tests/scripts/marketplace-pin_test.py
      - name: Validate plugin manifests
        run: |
          set -euo pipefail
          npm install -g @anthropic-ai/claude-code
          claude plugin validate .

  release:
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Tag and release if version is new
        run: |
          set -euo pipefail
          VERSION=$(jq -r .version plugins/doc-lifecycle/.claude-plugin/plugin.json)
          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "⏭️ **No release.** doc-lifecycle is at ${VERSION}, and \`v${VERSION}\` is already tagged — bump the version in plugin.json to cut a release." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          gh release create "v${VERSION}" \
            --target "${GITHUB_SHA}" \
            --title "doc-lifecycle v${VERSION}" \
            --generate-notes
          echo "🏷️ **Released [doc-lifecycle v${VERSION}](${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/tag/v${VERSION})** at \`${GITHUB_SHA:0:7}\`." >> "$GITHUB_STEP_SUMMARY"
